# Example agent — rename and edit me.
# Copy this file to <agent-name>.yml in the same folder.

name: example
description: Example subagent. Rename and replace with a real agent. Triggers when Claude needs a delegated task done in an isolated context — e.g., "spawn the example agent to do X".
model: sonnet
tools:
  - Read
  - Grep
system_prompt: |
  You are the example agent. When invoked:
    1. Acknowledge you're the example agent and ran successfully.
    2. Suggest the user replace this with a real agent definition.
    3. Don't do anything destructive — examples are read-only.
